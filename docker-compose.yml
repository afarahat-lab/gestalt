services:
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - '${SERVER_PORT:-3000}:3000'
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-gestalt}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gestalt}
      - REDIS_URL=redis://redis:6379
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - LLM_TIMEOUT_MS=${LLM_TIMEOUT_MS:-120000}
      # TEST_REPORT_002 Fix 1 — explicit override for the wire shape
      # the env-default LLM client sends. Set to `responses` for OpenAI
      # reasoning models (gpt-5*, o1, o3, `chat-latest` which now
      # requires `max_completion_tokens`). Unset → `chat-completions`.
      - LLM_API_SHAPE=${LLM_API_SHAPE:-}
      - JWT_SECRET=${JWT_SECRET}
      - SERVER_BASE_URL=${SERVER_BASE_URL:-http://localhost:3000}
      - SESSION_TTL_MINUTES=${SESSION_TTL_MINUTES:-480}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # Session 4 — encrypted secrets vault.
      # Provide GESTALT_MASTER_KEY here OR mount /etc/gestalt/master.key
      # below. In dev (NODE_ENV != production) a fresh key is auto-
      # generated in ./master.key on first boot with a loud warning.
      # - GESTALT_MASTER_KEY=${GESTALT_MASTER_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - projects_data:/app/projects
      # ADR-040 — optional corporate identity config + keytab. Omit
      # these mounts for local-only deployments; the server starts
      # cleanly without auth.config.json (local fallback per
      # ADR-025). For production:
      #   - mount auth.config.json with mode 0600, owned by root
      #   - mount krb5.keytab with mode 0600 (Kerberos provider)
      # Uncomment the lines below after creating the host-side files.
      # - ./auth.config.json:/etc/gestalt/auth.config.json:ro
      # - ./krb5.keytab:/etc/gestalt/krb5.keytab:ro
      # Session 4 + TEST_REPORT_002 Fix 2 — master key for the
      # encrypted secrets vault. The file is mounted read-only so
      # `docker compose up -d --build` doesn't regenerate it (which
      # would invalidate every vault-encrypted project Git PAT +
      # platform secret on every rebuild). Generate once with:
      #   openssl rand -base64 32 > master.key
      # Then chmod 600 master.key and back it up out of band — if this
      # key is lost, every encrypted secret becomes unreadable. The
      # file is .gitignored.
      - ./master.key:/etc/gestalt/master.key:ro

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-gestalt}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-gestalt}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-gestalt}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning

volumes:
  postgres_data:
  redis_data:
  projects_data:
